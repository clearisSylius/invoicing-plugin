# Sylius admin compone breadcrumbs y títulos de páginas CRUD a partir del
# alias del recurso, con el patrón `<applicationName>.ui.<singularName|pluralName>`.
# Para nuestro alias `clearis_invoicing.invoice` busca `clearis_invoicing.ui.invoice`
# y `clearis_invoicing.ui.invoices`. Sin estas claves muestra la propia
# cadena literal (ej. "Mostrar clearis_invoicing.ui.invoice"), por eso
# vivimos ESTA rama del árbol de traducciones aquí arriba aunque el resto
# del bundle use el prefijo `clearis:`.
clearis_invoicing:
    # Sylius admin compone breadcrumbs y títulos de páginas CRUD a partir
    # del alias del recurso: `<applicationName>.ui.<singularName|pluralName>`.
    # Para alias del estilo `clearis_invoicing.invoice_series` el singular es
    # `invoice_series` (con guion bajo). Hay que listarlos todos para que el
    # breadcrumb no muestre el literal.
    ui:
        invoice: 'Factura'
        invoices: 'Facturas'
        # Doctrine Inflector pluraliza "series" como "series" (palabra
        # incontable en inglés), así que singular y plural usan la misma
        # cadena en español también ("Serie" — abreviado por consistencia
        # con la UI: en breadcrumbs Sylius añade los artículos).
        invoice_series: 'Series de facturación'
        invoice_template: 'Plantilla de factura'
        invoice_templates: 'Plantillas de factura'


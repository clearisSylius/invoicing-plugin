name: Build

on:
    push:
        branches: [main]
    pull_request: ~

jobs:
    coding_standard:
        name: "Coding Standard (ECS)"
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: "8.2"
                    coverage: none
                    tools: composer:v2

            -   name: Get Composer cache directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Cache Composer dependencies
                uses: actions/cache@v5
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-ecs-${{ hashFiles('**/composer.json') }}
                    restore-keys: ${{ runner.os }}-composer-ecs-

            -   name: Install dependencies
                run: composer install --no-interaction --no-progress --prefer-dist

            -   name: Run ECS
                run: vendor/bin/ecs check --no-progress-bar

    static_analysis:
        name: "Static Analysis (PHPStan level max)"
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: "8.2"
                    coverage: none
                    tools: composer:v2

            -   name: Get Composer cache directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Cache Composer dependencies
                uses: actions/cache@v5
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-phpstan-${{ hashFiles('**/composer.json') }}
                    restore-keys: ${{ runner.os }}-composer-phpstan-

            -   name: Install dependencies
                run: composer install --no-interaction --no-progress --prefer-dist

            -   name: Run PHPStan
                run: vendor/bin/phpstan analyse --no-progress

    tests:
        name: "Tests (PHP ${{ matrix.php }})"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4"]
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    coverage: none
                    tools: composer:v2

            -   name: Get Composer cache directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Cache Composer dependencies
                uses: actions/cache@v5
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-phpunit-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
                    restore-keys: ${{ runner.os }}-composer-phpunit-${{ matrix.php }}-

            -   name: Install dependencies
                run: composer install --no-interaction --no-progress --prefer-dist

            -   name: Run PHPUnit
                run: vendor/bin/phpunit --colors=never

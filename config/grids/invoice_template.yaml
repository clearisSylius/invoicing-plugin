sylius_grid:
    grids:
        clearis_invoicing_template:
            driver:
                name: doctrine/orm
                options:
                    class: ClearisSylius\InvoicingPlugin\Entity\InvoiceTemplate
            sorting:
                code: asc
            limits: [25, 50, 100]
            fields:
                code:
                    type: string
                    label: 'clearis.grid.template.code'
                    sortable: ~
                name:
                    type: string
                    label: 'clearis.grid.template.name'
                type:
                    type: string
                    label: 'clearis.grid.template.type'
                channel:
                    type: twig
                    label: 'clearis.grid.template.channel'
                    path: channel
                    options:
                        template: '@ClearisSyliusInvoicingPlugin/admin/invoice/_partials/channel.html.twig'
                twigTemplate:
                    type: string
                    label: 'clearis.grid.template.twig_template'
            actions:
                main:
                    create:
                        type: create
                item:
                    update:
                        type: update
                    delete:
                        type: delete
